name: build and publish editor docker image
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
  push:
    paths:
      - 'Dockerfile'
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      ghcr:  ${{ steps.get_sha.outputs.ghcr }}
      dockerhub:  ${{ steps.get_sha.outputs.dockerhub }}
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 'latest'
      - name: version bump
        id: version-bump
        run: |
          git fetch origin main
          git checkout main
          git pull origin main --ff-only
          BUILDTIME=$(date -u +%Y-%m-%d)
          VERSION=$(bun -p "require('./package.json').version")
          BLINE=$(awk '/org.opencontainers.image.created/ { print NR; exit }' Dockerfile)
          VLINE=$(awk '/org.opencontainers.image.version/ { print NR; exit }' Dockerfile)
          sed -i "${BLINE}c\LABEL org.opencontainers.image.created=\"${BUILDTIME}\"" Dockerfile
          sed -i "${VLINE}c\LABEL org.opencontainers.image.version=\"${VERSION}\"" Dockerfile
          echo "buildtime=$BUILDTIME" >> "$GITHUB_OUTPUT"
          echo "buildversion=$VERSION" >> "$GITHUB_OUTPUT"
          git add Dockerfile
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            COMMIT_NAME="${{ github.event.head_commit.author.name }}"
            COMMIT_EMAIL="${{ github.event.head_commit.author.email }}"
            if [ -z "$COMMIT_NAME" ]; then
              COMMIT_NAME="${{ github.actor }}"
              COMMIT_EMAIL="${{ github.actor }}@users.noreply.github.com"
            fi
            if [ -z "${{ github.event.head_commit.message }}" ]; then
              COMMIT_MSG="${{ github.event.head_commit.message }}"
            else
            COMMIT_MSG="$(git log -1 --pretty=%s || true)"
            fi
            if [ -z "$COMMIT_MSG" ]; then
              COMMIT_MSG="chore(container) docker build"
            fi
            git config --global user.name "$COMMIT_NAME"
            git config --global user.email "$COMMIT_EMAIL"
            git commit --author="$COMMIT_NAME <$COMMIT_EMAIL>" -m "$COMMIT_MSG"
            git push
          fi
      - name: set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: set up docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: login to github container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: login to docker hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            xerostyle/text0wnz
          flavor: |
            latest=true
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-
      - name: get docker short sha
        id: get_sha
        run: |
          GHCR=$(echo "${{ steps.meta.outputs.tags }}" | grep '^ghcr\.io.*/text0wnz:sha-' | head -n1)
          GHCR="${GHCR:-ghcr.io/xero/text0wnz:latest}"
          DHUB=$(echo "${{ steps.meta.outputs.tags }}" | grep '^xerostyle/text0wnz:sha-' | head -n1)
          DHUB="${DHUB:-xerostyle/text0wnz:latest}"
          echo "ghcr=$GHCR" >> $GITHUB_OUTPUT
          echo "dockerhub=$DHUB" >> $GITHUB_OUTPUT
      - name: build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          annotations: |
            org.opencontainers.image.authors=https://github.com/xero/text0wnz/graphs/contributors
            org.opencontainers.image.description=Retro Text Art Editor for ANSI/ASCII/NFO/XBIN Files Rebooted for the Modern Web
            org.opencontainers.image.documentation=https://github.com/xero/text0wnz/wiki
            org.opencontainers.image.source=https://github.com/xero/text0wnz
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=text0wnz
            org.opencontainers.image.url=https://text.0w.nz
            org.opencontainers.image.created="${{ steps.version-bump.outputs.buildtime }}"
            org.opencontainers.image.version="${{ steps.version-bump.outputs.buildversion }}"
