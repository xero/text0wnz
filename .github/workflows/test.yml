permissions:
  contents: write

name: Test Suite

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Bun
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun i

      - name: Run unit tests with coverage
        run: bun check:coverage

      - name: Inject dark theme into coverage report
        run: |
          echo "@media (prefers-color-scheme:dark){.cover-empty,body{background:#000}body{color:#efefef}table{color:#000}table,td,th{border:1px solid #222!important}td.empty{color:#eee}.cbranch-no,.cstat-no,.fstat-no{background:#afe9dc}.cline-yes,.high{background:#f2bfff}.cline-no,.low{background:#bbf2e8}.fraction,.quiet,table .chart,table .high,table .low,td.text,th.file,th.pct{-webkit-filter:invert(100%)}.footer{display:none!important}body>div.wrapper>div:first-child>p{background:#ddd;width:fit-content;padding:10px}}" >> tests/results/coverage/base.css

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: success()
        with:
          directory: ./tests/results/coverage
          fail_ci_if_error: false

      - name: Upload all unit test results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: tests/results/
          retention-days: 3

      - name: Add artifact download info to summary
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "### :package: Unit Test Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts for this run are available under the **Artifacts** section at [this workflow run]($RUN_URL)." >> $GITHUB_STEP_SUMMARY
          echo "- Or use GitHub CLI: \`gh run download ${{ github.run_id }} -n unit-test-results\`" >> $GITHUB_STEP_SUMMARY

  e2e-tests:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.55.0-jammy
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          apt-get update
          apt-get install -y unzip
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install project dependencies
        run: bun i

      - name: Install playwright and its dependencies
        run: bun playwright:install

      - name: Build application
        run: bun bake

      - name: Run E2E tests
        run: bun check:e2e
        env:
          HOME: /root
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:4173

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-report
          path: tests/results/playwright-report/
          retention-days: 3

      - name: Upload Playwright raw results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-raw
          path: tests/results/e2e/
          retention-days: 3

      - name: Upload all e2e test results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: tests/results/
          retention-days: 3

      - name: Add artifact download info to summary
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "### :package: E2E Test Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts for this run are available under the **Artifacts** section at [this workflow run]($RUN_URL)." >> $GITHUB_STEP_SUMMARY
          echo "- Or use GitHub CLI: \`gh run download ${{ github.run_id }} -n e2e-test-results\`" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright HTML report: [playwright-report]($RUN_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright raw: [playwright-raw]($RUN_URL)" >> $GITHUB_STEP_SUMMARY

  lint:
    runs-on: ubuntu-latest
    name: Lint Code
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Bun
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun i

      - name: Run linter
        run: bun lint

  build-test:
    runs-on: ubuntu-latest
    name: Build Test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Bun
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun i

      - name: Build application
        run: bun bake

      - name: Check build artifacts
        run: |
          test -f dist/index.html
          test -f dist/app.min.js
          test -f dist/editor.min.css
          test -d dist/ui
          echo "Build successful - artifact present"

  commit-results:
    name: Commit and Push All Test Results
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main'
    outputs:
      artifact_info: ${{ steps.artifact-info.outputs.summary }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: tests/results/

      - name: Download e2e test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: tests/results/

      - name: Download Playwright HTML report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: tests/results/playwright-report/

      - name: Download Playwright raw results
        uses: actions/download-artifact@v4
        with:
          name: playwright-raw
          path: tests/results/e2e/

      - name: Commit and push all test results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/results/
          git commit -m "chore(ci): update all test results [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.CICD_TOKEN }}

      - name: Set artifact info output
        id: artifact-info
        run: |
          {
            echo 'summary<<EOF'
            echo 'Test artifacts from this run are available under the **Artifacts** section at [this workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}):'
            echo ''
            echo '- unit-test-results'
            echo '- e2e-test-results'
            echo '- playwright-report'
            echo '- playwright-raw'
            echo ''
            echo '#### Download via GitHub CLI:'
            echo '- `gh run download ${{ github.run_id }} -n unit-test-results`'
            echo '- `gh run download ${{ github.run_id }} -n e2e-test-results`'
            echo '- `gh run download ${{ github.run_id }} -n playwright-report`'
            echo '- `gh run download ${{ github.run_id }} -n playwright-raw`'
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Add artifact download info to summary
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "### :package: Test Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts for this run are available under the **Artifacts** section at [this workflow run]($RUN_URL)." >> $GITHUB_STEP_SUMMARY
          echo "#### Download via GitHub CLI:" >> $GITHUB_STEP_SUMMARY
          echo "- \`gh run download ${{ github.run_id }} -n unit-test-results\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`gh run download ${{ github.run_id }} -n e2e-test-results\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`gh run download ${{ github.run_id }} -n playwright-report\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`gh run download ${{ github.run_id }} -n playwright-raw\`" >> $GITHUB_STEP_SUMMARY

      - name: Comment artifact download links on PR (edit or create)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CICD_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const runId = context.runId;
            const runUrl = `https://github.com/${repo}/actions/runs/${runId}`;
            const artifacts = [
              "unit-test-results",
              "e2e-test-results",
              "playwright-report",
              "playwright-raw"
            ];
            const commentHeader = "### :package: Download Test Artifacts for this PR";
            const lines = [
              commentHeader,
              `Artifacts for this run are available under the **Artifacts** section at [this workflow run](${runUrl}).`,
              "",
              "#### Download via GitHub CLI:",
              ...artifacts.map(a => `- \`gh run download ${runId} -n ${a}\``)
            ];
            const body = lines.join('\n');

            // Get all comments on this PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            // Try to find a previous comment from this bot with our header
            const previous = comments.find(
              c =>
                c.user.type === "Bot" &&
                c.body &&
                c.body.startsWith(commentHeader)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
